plugins {
    id 'com.android.application'
}

android {
    namespace = 'com.magicii.dummy'
    compileSdk = 35
    ndkVersion = '28.2.13676358'

    defaultConfig {
        applicationId = "com.magicii.dummy"
        minSdk = 24
        targetSdk = 35
        versionCode = 1
        versionName = "1.0"

        ndk {
            abiFilters += ['arm64-v8a']
        }
    }

    buildTypes {
        debug {
            debuggable = true
        }

        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
}
